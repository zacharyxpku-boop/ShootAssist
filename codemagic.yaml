workflows:
  ios-release:
    name: ShootAssist iOS Release
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      xcode: 16.2
      groups:
        - app_store_credentials  # 在 Codemagic 界面配置以下变量:
                                 # APP_STORE_CONNECT_ISSUER_ID
                                 # APP_STORE_CONNECT_KEY_IDENTIFIER
                                 # APP_STORE_CONNECT_PRIVATE_KEY
                                 # CERTIFICATE_PRIVATE_KEY
      vars:
        BUNDLE_ID: com.shootassist.mobile
        APP_STORE_APP_ID: "6761611972"

    triggering:
      events:
        - tag
      tag_patterns:
        - pattern: 'v*'
          include: true

    scripts:
      - name: Install XcodeGen
        script: |
          brew install xcodegen

      - name: Generate Xcode project
        script: |
          cd $CM_BUILD_DIR
          xcodegen generate

      - name: Set up code signing
        script: |
          keychain initialize
          app-store-connect fetch-signing-files $BUNDLE_ID \
            --type IOS_APP_STORE \
            --create
          keychain add-certificates
          xcode-project use-profiles

      - name: Build & Archive
        script: |
          cd $CM_BUILD_DIR
          PROFILE_PATH=$(ls ~/Library/MobileDevice/Provisioning\ Profiles/*.mobileprovision 2>/dev/null | head -1)
          echo "Found profile: $PROFILE_PATH"
          UUID=$(security cms -D -i "$PROFILE_PATH" | plutil -extract UUID raw -)
          echo "Profile UUID: $UUID"
          xcodebuild archive \
            -project ShootAssist.xcodeproj \
            -scheme ShootAssist \
            -configuration Release \
            -archivePath "$CM_BUILD_DIR/ShootAssist.xcarchive" \
            -destination "generic/platform=iOS" \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM=THXYDBVXGW \
            PROVISIONING_PROFILE="$UUID"

      - name: Export IPA
        script: |
          cat > /tmp/ExportOptions.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>stripSwiftSymbols</key>
            <true/>
            <key>uploadBitcode</key>
            <false/>
            <key>uploadSymbols</key>
            <true/>
          </dict>
          </plist>
          EOF
          xcodebuild -exportArchive \
            -archivePath "$CM_BUILD_DIR/ShootAssist.xcarchive" \
            -exportOptionsPlist /tmp/ExportOptions.plist \
            -exportPath "$CM_BUILD_DIR/export"

    artifacts:
      - $CM_BUILD_DIR/export/*.ipa
      - $CM_BUILD_DIR/ShootAssist.xcarchive
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
        beta_groups:
          - "Internal Testers"

  ios-dev:
    name: ShootAssist Dev Build (TestFlight)
    max_build_duration: 45
    instance_type: mac_mini_m2

    environment:
      xcode: 16.2
      groups:
        - app_store_credentials
      vars:
        BUNDLE_ID: com.shootassist.mobile

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true

    scripts:
      - name: Install XcodeGen
        script: brew install xcodegen

      - name: Generate Xcode project
        script: |
          cd $CM_BUILD_DIR
          xcodegen generate

      - name: Set up code signing
        script: |
          keychain initialize
          app-store-connect fetch-signing-files $BUNDLE_ID \
            --type IOS_APP_STORE \
            --create
          keychain add-certificates
          xcode-project use-profiles

      - name: Build IPA
        script: |
          cd $CM_BUILD_DIR
          xcode-project build-ipa \
            --project ShootAssist.xcodeproj \
            --scheme ShootAssist \
            --config Release

    artifacts:
      - $CM_BUILD_DIR/output/ios/*.ipa

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true

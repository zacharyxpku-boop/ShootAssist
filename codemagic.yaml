workflows:
  ios-release:
    name: ShootAssist iOS Release
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      xcode: 16.2
      groups:
        - app_store_credentials  # 在 Codemagic 界面配置以下变量:
                                 # APP_STORE_CONNECT_ISSUER_ID
                                 # APP_STORE_CONNECT_KEY_IDENTIFIER
                                 # APP_STORE_CONNECT_PRIVATE_KEY
                                 # CERTIFICATE_PRIVATE_KEY
      vars:
        BUNDLE_ID: com.shootassist.mobile
        APP_STORE_APP_ID: "6761611972"

    triggering:
      events:
        - tag
      tag_patterns:
        - pattern: 'v*'
          include: true

    scripts:
      - name: Install XcodeGen
        script: |
          brew install xcodegen

      - name: Generate Xcode project
        script: |
          cd $CM_BUILD_DIR
          # 用 Unix 时间戳做 build number，永远不重复
          NEW_BUILD=$(date +%s)
          echo "Build number: $NEW_BUILD"
          perl -i -pe "s/CURRENT_PROJECT_VERSION:.*/CURRENT_PROJECT_VERSION: \"$NEW_BUILD\"/" project.yml
          grep CURRENT_PROJECT_VERSION project.yml
          xcodegen generate

      - name: Set up code signing
        script: |
          keychain initialize
          app-store-connect fetch-signing-files $BUNDLE_ID \
            --type IOS_APP_STORE \
            --create
          keychain add-certificates
          xcode-project use-profiles

      - name: Build & Archive
        script: |
          cd $CM_BUILD_DIR
          PROFILE_PATH=$(ls ~/Library/MobileDevice/Provisioning\ Profiles/*.mobileprovision 2>/dev/null | head -1)
          echo "Found profile: $PROFILE_PATH"
          UUID=$(security cms -D -i "$PROFILE_PATH" | plutil -extract UUID raw -)
          echo "Profile UUID: $UUID"
          xcodebuild archive \
            -project ShootAssist.xcodeproj \
            -scheme ShootAssist \
            -configuration Release \
            -archivePath "$CM_BUILD_DIR/ShootAssist.xcarchive" \
            -destination "generic/platform=iOS" \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM=THXYDBVXGW \
            PROVISIONING_PROFILE="$UUID"

      - name: Release Bundle Self-Check
        script: |
          # App Review 拒审硬伤自检 —— Archive 后、Export 前拦截
          # 1) .storekit 测试配置不得入包（2.3.1 / 2.5.1）
          # 2) Info.plist 4 条隐私字符串齐全（5.1.1）
          # 3) PrivacyInfo.xcprivacy 必须存在（iOS 17 强制）
          APP_BUNDLE="$CM_BUILD_DIR/ShootAssist.xcarchive/Products/Applications/ShootAssist.app"
          [ -d "$APP_BUNDLE" ] || { echo "✗ 没找到 $APP_BUNDLE"; exit 1; }

          echo "▶ 扫描 .storekit 测试文件"
          HITS=$(find "$APP_BUNDLE" \( -iname "*.storekit" -o -iname "*.storekitconfig" \) 2>/dev/null || true)
          if [ -n "$HITS" ]; then
            echo "✗ Release bundle 混入 StoreKit 测试配置："; echo "$HITS"; exit 1
          fi

          echo "▶ 核对 Info.plist 隐私字符串"
          INFO="$APP_BUNDLE/Info.plist"
          for k in NSCameraUsageDescription NSMicrophoneUsageDescription NSPhotoLibraryAddUsageDescription; do
            /usr/libexec/PlistBuddy -c "Print :$k" "$INFO" >/dev/null 2>&1 || { echo "✗ 缺 $k"; exit 1; }
          done

          echo "▶ 核对 PrivacyInfo.xcprivacy"
          [ -f "$APP_BUNDLE/PrivacyInfo.xcprivacy" ] || { echo "✗ 缺 PrivacyInfo.xcprivacy"; exit 1; }

          echo "✓ Release bundle 自检通过"

      - name: Export IPA
        script: |
          rm -f /tmp/ExportOptions.plist
          /usr/libexec/PlistBuddy -c "Add :method string app-store-connect" /tmp/ExportOptions.plist
          /usr/libexec/PlistBuddy -c "Add :signingStyle string manual" /tmp/ExportOptions.plist
          /usr/libexec/PlistBuddy -c "Add :teamID string THXYDBVXGW" /tmp/ExportOptions.plist
          /usr/libexec/PlistBuddy -c "Add :provisioningProfiles dict" /tmp/ExportOptions.plist
          /usr/libexec/PlistBuddy -c "Add :provisioningProfiles:com.shootassist.mobile string ShootAssist ios_app_store 1775216981" /tmp/ExportOptions.plist
          /usr/libexec/PlistBuddy -c "Add :stripSwiftSymbols bool true" /tmp/ExportOptions.plist
          /usr/libexec/PlistBuddy -c "Add :uploadBitcode bool false" /tmp/ExportOptions.plist
          /usr/libexec/PlistBuddy -c "Add :uploadSymbols bool true" /tmp/ExportOptions.plist
          xcodebuild -exportArchive \
            -archivePath "$CM_BUILD_DIR/ShootAssist.xcarchive" \
            -exportOptionsPlist /tmp/ExportOptions.plist \
            -exportPath "$CM_BUILD_DIR/export"

    artifacts:
      - $CM_BUILD_DIR/export/*.ipa
      - $CM_BUILD_DIR/ShootAssist.xcarchive
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
        beta_groups:
          - "Internal Testers"

  ios-dev:
    name: ShootAssist Dev Build (TestFlight)
    max_build_duration: 45
    instance_type: mac_mini_m2

    environment:
      xcode: 16.2
      groups:
        - app_store_credentials
      vars:
        BUNDLE_ID: com.shootassist.mobile
        APP_STORE_APP_ID: "6761611972"

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true

    scripts:
      - name: Install XcodeGen
        script: brew install xcodegen

      - name: Generate Xcode project
        script: |
          cd $CM_BUILD_DIR
          # 用 Unix 时间戳做 build number，永远不重复
          NEW_BUILD=$(date +%s)
          echo "Build number: $NEW_BUILD"
          echo "$NEW_BUILD" > /tmp/build_number.txt
          perl -i -pe "s/CURRENT_PROJECT_VERSION:.*/CURRENT_PROJECT_VERSION: \"$NEW_BUILD\"/" project.yml
          grep CURRENT_PROJECT_VERSION project.yml
          xcodegen generate

      - name: Set up code signing
        script: |
          keychain initialize
          app-store-connect fetch-signing-files $BUNDLE_ID \
            --type IOS_APP_STORE \
            --create
          keychain add-certificates
          xcode-project use-profiles

      - name: Build IPA
        script: |
          cd $CM_BUILD_DIR
          NEW_BUILD=$(cat /tmp/build_number.txt)
          echo "Building with CURRENT_PROJECT_VERSION=$NEW_BUILD"
          xcodebuild archive \
            -project ShootAssist.xcodeproj \
            -scheme ShootAssist \
            -configuration Release \
            -archivePath "$CM_BUILD_DIR/ShootAssist.xcarchive" \
            -destination "generic/platform=iOS" \
            CURRENT_PROJECT_VERSION="$NEW_BUILD"
          rm -f /tmp/ExportOptions.plist
          /usr/libexec/PlistBuddy -c "Add :method string app-store-connect" /tmp/ExportOptions.plist
          /usr/libexec/PlistBuddy -c "Add :signingStyle string manual" /tmp/ExportOptions.plist
          /usr/libexec/PlistBuddy -c "Add :teamID string THXYDBVXGW" /tmp/ExportOptions.plist
          /usr/libexec/PlistBuddy -c "Add :provisioningProfiles dict" /tmp/ExportOptions.plist
          /usr/libexec/PlistBuddy -c "Add :provisioningProfiles:com.shootassist.mobile string ShootAssist ios_app_store 1775216981" /tmp/ExportOptions.plist
          /usr/libexec/PlistBuddy -c "Add :stripSwiftSymbols bool true" /tmp/ExportOptions.plist
          /usr/libexec/PlistBuddy -c "Add :uploadBitcode bool false" /tmp/ExportOptions.plist
          /usr/libexec/PlistBuddy -c "Add :uploadSymbols bool true" /tmp/ExportOptions.plist
          echo "ExportOptions:"; /usr/libexec/PlistBuddy -c "Print" /tmp/ExportOptions.plist
          xcodebuild -exportArchive \
            -archivePath "$CM_BUILD_DIR/ShootAssist.xcarchive" \
            -exportOptionsPlist /tmp/ExportOptions.plist \
            -exportPath "$CM_BUILD_DIR/build/ios/ipa"

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true

workflows:
  ios-release:
    name: ShootAssist iOS Release
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      xcode: 16.2
      groups:
        - app_store_credentials  # 在 Codemagic 界面配置以下变量:
                                 # APP_STORE_CONNECT_ISSUER_ID
                                 # APP_STORE_CONNECT_KEY_IDENTIFIER
                                 # APP_STORE_CONNECT_PRIVATE_KEY
                                 # CERTIFICATE_PRIVATE_KEY
      vars:
        BUNDLE_ID: com.shootassist.mobile
        APP_STORE_APP_ID: "6761611972"

    triggering:
      events:
        - tag
      tag_patterns:
        - pattern: 'v*'
          include: true

    scripts:
      - name: Install XcodeGen
        script: |
          brew install xcodegen

      - name: Convert ML model to CoreML
        script: |
          cd $CM_BUILD_DIR
          pip3 install tensorflow coremltools tf2onnx onnx -q
          python3 ml/mac_convert_coreml.py
          # Copy model + scaler into Xcode Resources
          cp ml/models/GestureClassifier.mlpackage ShootAssist/Resources/
          cp ml/models/scaler_params.json ShootAssist/Resources/

      - name: Generate Xcode project
        script: |
          cd $CM_BUILD_DIR
          # 从 App Store Connect 拉取最新 build number，自动 +1，彻底避免重复上传报错
          MIN_BUILD=5
          LATEST=$(app-store-connect get-latest-testflight-build-number "$APP_STORE_APP_ID" \
                    --api-key "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
                    --issuer-id "$APP_STORE_CONNECT_ISSUER_ID" \
                    2>/dev/null || echo "$MIN_BUILD")
          if [ "$LATEST" -lt "$MIN_BUILD" ]; then LATEST=$MIN_BUILD; fi
          NEW_BUILD=$((LATEST + 1))
          echo "App Store latest build: $LATEST → new build: $NEW_BUILD"
          perl -i -pe "s/CURRENT_PROJECT_VERSION:.*/CURRENT_PROJECT_VERSION: \"$NEW_BUILD\"/" project.yml
          grep CURRENT_PROJECT_VERSION project.yml
          xcodegen generate

      - name: Set up code signing
        script: |
          keychain initialize
          app-store-connect fetch-signing-files $BUNDLE_ID \
            --type IOS_APP_STORE \
            --create
          keychain add-certificates
          xcode-project use-profiles

      - name: Build & Archive
        script: |
          cd $CM_BUILD_DIR
          PROFILE_PATH=$(ls ~/Library/MobileDevice/Provisioning\ Profiles/*.mobileprovision 2>/dev/null | head -1)
          echo "Found profile: $PROFILE_PATH"
          UUID=$(security cms -D -i "$PROFILE_PATH" | plutil -extract UUID raw -)
          echo "Profile UUID: $UUID"
          xcodebuild archive \
            -project ShootAssist.xcodeproj \
            -scheme ShootAssist \
            -configuration Release \
            -archivePath "$CM_BUILD_DIR/ShootAssist.xcarchive" \
            -destination "generic/platform=iOS" \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM=THXYDBVXGW \
            PROVISIONING_PROFILE="$UUID"

      - name: Export IPA
        script: |
          rm -f /tmp/ExportOptions.plist
          /usr/libexec/PlistBuddy -c "Add :method string app-store-connect" /tmp/ExportOptions.plist
          /usr/libexec/PlistBuddy -c "Add :signingStyle string manual" /tmp/ExportOptions.plist
          /usr/libexec/PlistBuddy -c "Add :teamID string THXYDBVXGW" /tmp/ExportOptions.plist
          /usr/libexec/PlistBuddy -c "Add :provisioningProfiles dict" /tmp/ExportOptions.plist
          /usr/libexec/PlistBuddy -c "Add :provisioningProfiles:com.shootassist.mobile string ShootAssist ios_app_store 1775216981" /tmp/ExportOptions.plist
          /usr/libexec/PlistBuddy -c "Add :stripSwiftSymbols bool true" /tmp/ExportOptions.plist
          /usr/libexec/PlistBuddy -c "Add :uploadBitcode bool false" /tmp/ExportOptions.plist
          /usr/libexec/PlistBuddy -c "Add :uploadSymbols bool true" /tmp/ExportOptions.plist
          xcodebuild -exportArchive \
            -archivePath "$CM_BUILD_DIR/ShootAssist.xcarchive" \
            -exportOptionsPlist /tmp/ExportOptions.plist \
            -exportPath "$CM_BUILD_DIR/export"

    artifacts:
      - $CM_BUILD_DIR/export/*.ipa
      - $CM_BUILD_DIR/ShootAssist.xcarchive
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
        beta_groups:
          - "Internal Testers"

  ios-dev:
    name: ShootAssist Dev Build (TestFlight)
    max_build_duration: 45
    instance_type: mac_mini_m2

    environment:
      xcode: 16.2
      groups:
        - app_store_credentials
      vars:
        BUNDLE_ID: com.shootassist.mobile
        APP_STORE_APP_ID: "6761611972"

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true

    scripts:
      - name: Install XcodeGen
        script: brew install xcodegen

      - name: Convert ML model to CoreML
        script: |
          cd $CM_BUILD_DIR
          pip3 install tensorflow coremltools tf2onnx onnx -q
          python3 ml/mac_convert_coreml.py
          cp ml/models/GestureClassifier.mlpackage ShootAssist/Resources/
          cp ml/models/scaler_params.json ShootAssist/Resources/

      - name: Generate Xcode project
        script: |
          cd $CM_BUILD_DIR
          # 从 App Store Connect 拉取最新 build number，自动 +1
          # get-latest-testflight-build-number 只返回已到达 TestFlight 的构建，
          # "Processing" 中的构建不计入，所以用 MIN_BUILD 兜底
          MIN_BUILD=5
          LATEST=$(app-store-connect get-latest-testflight-build-number "$APP_STORE_APP_ID" \
                    --api-key "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
                    --issuer-id "$APP_STORE_CONNECT_ISSUER_ID" \
                    2>/dev/null || echo "$MIN_BUILD")
          if [ "$LATEST" -lt "$MIN_BUILD" ]; then LATEST=$MIN_BUILD; fi
          NEW_BUILD=$((LATEST + 1))
          echo "App Store latest build: $LATEST → new build: $NEW_BUILD"
          # 持久化给 Build IPA 步骤跨步骤读取
          echo "$NEW_BUILD" > /tmp/build_number.txt
          perl -i -pe "s/CURRENT_PROJECT_VERSION:.*/CURRENT_PROJECT_VERSION: \"$NEW_BUILD\"/" project.yml
          grep CURRENT_PROJECT_VERSION project.yml
          xcodegen generate

      - name: Set up code signing
        script: |
          keychain initialize
          app-store-connect fetch-signing-files $BUNDLE_ID \
            --type IOS_APP_STORE \
            --create
          keychain add-certificates
          xcode-project use-profiles

      - name: Build IPA
        script: |
          cd $CM_BUILD_DIR
          NEW_BUILD=$(cat /tmp/build_number.txt)
          echo "Building with CURRENT_PROJECT_VERSION=$NEW_BUILD"
          xcodebuild archive \
            -project ShootAssist.xcodeproj \
            -scheme ShootAssist \
            -configuration Release \
            -archivePath "$CM_BUILD_DIR/ShootAssist.xcarchive" \
            -destination "generic/platform=iOS" \
            CURRENT_PROJECT_VERSION="$NEW_BUILD"
          rm -f /tmp/ExportOptions.plist
          /usr/libexec/PlistBuddy -c "Add :method string app-store-connect" /tmp/ExportOptions.plist
          /usr/libexec/PlistBuddy -c "Add :signingStyle string manual" /tmp/ExportOptions.plist
          /usr/libexec/PlistBuddy -c "Add :teamID string THXYDBVXGW" /tmp/ExportOptions.plist
          /usr/libexec/PlistBuddy -c "Add :provisioningProfiles dict" /tmp/ExportOptions.plist
          /usr/libexec/PlistBuddy -c "Add :provisioningProfiles:com.shootassist.mobile string ShootAssist ios_app_store 1775216981" /tmp/ExportOptions.plist
          /usr/libexec/PlistBuddy -c "Add :stripSwiftSymbols bool true" /tmp/ExportOptions.plist
          /usr/libexec/PlistBuddy -c "Add :uploadBitcode bool false" /tmp/ExportOptions.plist
          /usr/libexec/PlistBuddy -c "Add :uploadSymbols bool true" /tmp/ExportOptions.plist
          echo "ExportOptions:"; /usr/libexec/PlistBuddy -c "Print" /tmp/ExportOptions.plist
          xcodebuild -exportArchive \
            -archivePath "$CM_BUILD_DIR/ShootAssist.xcarchive" \
            -exportOptionsPlist /tmp/ExportOptions.plist \
            -exportPath "$CM_BUILD_DIR/build/ios/ipa"

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true

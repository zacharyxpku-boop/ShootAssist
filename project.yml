name: ShootAssist
options:
  bundleIdPrefix: com.shootassist
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "16.2"
  developmentLanguage: zh-Hans
settings:
  SWIFT_VERSION: "5.0"
  GENERATE_INFOPLIST_FILE: NO
  MARKETING_VERSION: "1.0.0"
  CURRENT_PROJECT_VERSION: "2"
targets:
  ShootAssist:
    type: application
    platform: iOS
    sources:
      - path: ShootAssist
        excludes:
          - "**/*.xcassets/*/Contents.json"
    resources:
      - path: ShootAssist/Assets.xcassets
    settings:
      INFOPLIST_FILE: ShootAssist/Info.plist
      PRODUCT_BUNDLE_IDENTIFIER: com.shootassist.mobile
      CODE_SIGN_STYLE: Automatic
      DEVELOPMENT_TEAM: THXYDBVXGW
      TARGETED_DEVICE_FAMILY: 1
      INFOPLIST_KEY_CFBundleDisplayName: "小白快门"
      INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.photography"
      INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
      INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
      INFOPLIST_KEY_UILaunchScreen_Generation: YES
      INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
      ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor

name: ShootAssist
options:
  bundleIdPrefix: com.shootassist
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "16.2"
  developmentLanguage: zh-Hans
settings:
  SWIFT_VERSION: "5.0"
  GENERATE_INFOPLIST_FILE: NO
  MARKETING_VERSION: "1.0.0"
  CURRENT_PROJECT_VERSION: "5"
targets:
  ShootAssist:
    type: application
    platform: iOS
    sources:
      - path: ShootAssist
        excludes:
          - "**/*.xcassets/*/Contents.json"
          # StoreKit Testing 配置文件严禁进入 Release bundle（App Review 会扫到拒审）
          # 仅在 Xcode Scheme → Run → Options → StoreKit Configuration 里手动挂载
          - "**/*.storekit"
    resources:
      - path: ShootAssist/Assets.xcassets
      - path: ShootAssist/PrivacyInfo.xcprivacy
      # ShootAssist.storekit 仅开发期 StoreKit Testing 使用，不打进 Release bundle。
      # 要用本地沙盒配置时，在 Xcode Scheme → Run → Options → StoreKit Configuration
      # 里手动选择该文件；不放到 resources 避免 App Review 扫到开发配置文件拒审。
    settings:
      INFOPLIST_FILE: ShootAssist/Info.plist
      PRODUCT_BUNDLE_IDENTIFIER: com.shootassist.mobile
      CODE_SIGN_STYLE: Automatic
      DEVELOPMENT_TEAM: THXYDBVXGW
      TARGETED_DEVICE_FAMILY: 1
      ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
      # 注：INFOPLIST_KEY_* 仅在 GENERATE_INFOPLIST_FILE=YES 时生效；
      # 我们显式提供 Info.plist，这些 key 若写在这里会被静默忽略，所以不列。
